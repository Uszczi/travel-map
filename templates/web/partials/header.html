<header class="bg-panel-2 border-b border-border py-10 px-4">
  <div class="flex flex-col items-center justify-center gap-2 max-w-3xl mx-auto">
    <img src="/static/images/favicon.png" alt="Travel Map" class="w-16 h-16 mb-3" />
    <h1 class="text-4xl font-bold text-center">Visit every street in selected city.</h1>
    <h2 class="text-xl text-center">This is a demo app for my exploration of graph algorithms and maps.</h2>
    <h3 class="text-base text-center leading-relaxed">Select a city from the list below. See how you could run through all the streets in the city.</h3>
    <h3 class="text-base text-center leading-relaxed">Import your own data to see how you could run through all the remaining streets in your city.</h3>
    <div class="relative mt-4 w-full max-w-md">
      <input
        id="city-search"
        type="search"
        name="q"
        placeholder="Search for a city…"
        autocomplete="off"

        hx-get="/htmx/geocode"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#city-results"
        hx-swap="innerHTML"
        class=" w-full px-4 py-2 rounded-lg bg-surface border border-border text-text placeholder-muted focus:outline-none focus:border-accent"
      />
      <input type="hidden" id="start_x" name="start_x" value="" />
      <input type="hidden" id="start_y" name="start_y" value="" />
      <input type="hidden" id="bbox_s" name="bbox_s" value="" />
      <input type="hidden" id="bbox_n" name="bbox_n" value="" />
      <input type="hidden" id="bbox_w" name="bbox_w" value="" />
      <input type="hidden" id="bbox_e" name="bbox_e" value="" />
      <div id="city-results" class="mt-2 absolute top-full inset-x-0 z-[1000] max-h-[300px] overflow-y-auto"></div>
      <button
        type="button"
        class="mt-2 w-full px-4 py-2 rounded-lg bg-accent text-surface font-semibold hover:brightness-110 focus:outline-none"
        hx-get="/htmx/route?algorithm=allstreet&prefer_new=true"
        hx-include="#start_x, #start_y, #bbox_s, #bbox_n, #bbox_w, #bbox_e"
        hx-target="#route-result"
        hx-swap="innerHTML"
      >
        Generate all streets
      </button>
      <div id="route-result" class="mt-2"></div>
    </div>
  </div>
</header>
