{% if error %}
<p class="text-danger">{{ error }}</p>
{% elif query and not items %}
<p class="text-muted">No matches for &ldquo;{{ query }}&rdquo;.</p>
{% elif items %}
<ul class="list-none m-0 p-0">
  {% for item in items %}
  <li>
    <button
      type="button"
      class="w-full text-left px-3.5 py-2.5 bg-panel hover:bg-panel-2 border border-border text-text cursor-pointer text-sm leading-snug rounded-[10px]"
      data-lat="{{ item.lat }}"
      data-lng="{{ item.lng }}"
      data-bbox-s="{{ item.boundingbox.south }}"
      data-bbox-n="{{ item.boundingbox.north }}"
      data-bbox-w="{{ item.boundingbox.west }}"
      data-bbox-e="{{ item.boundingbox.east }}"
      onclick="window.TravelMap.flyToCity(this)"
    >
      {{ item.label }}
    </button>
  </li>
  {% endfor %}
</ul>
{% endif %}
