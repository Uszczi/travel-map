{% if error %}
<p class="error">{{ error }}</p>
{% elif query and not items %}
<p class="muted">No matches for &ldquo;{{ query }}&rdquo;.</p>
{% elif items %}
<ul class="geocode-list">
  {% for item in items %}
  <li>
    <button
      type="button"
      class="geocode-item"
      data-lat="{{ item.lat }}"
      data-lng="{{ item.lng }}"
      data-bbox-s="{{ item.boundingbox.south }}"
      data-bbox-n="{{ item.boundingbox.north }}"
      data-bbox-w="{{ item.boundingbox.west }}"
      data-bbox-e="{{ item.boundingbox.east }}"
      onclick="window.TravelMap.flyToCity(this)"
    >
      {{ item.label }}
    </button>
  </li>
  {% endfor %}
</ul>
{% endif %}
