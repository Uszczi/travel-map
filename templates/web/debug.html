{% extends "base.html" %}

{% block title %}Theme Colors — Debug{% endblock %}

{% block content %}
<div class="max-w-[640px] mx-auto mt-10 px-5">
  <h1 class="m-0 mb-2 text-lg">Theme Colors</h1>
  <p class="m-0 mb-6 text-muted text-sm">Tailwind config colors used across the UI.</p>

  <div class="text-xs uppercase tracking-wide text-muted mb-3 mt-7">Tailwind Config Colors</div>
  <div class="grid gap-3" id="tw-colors"></div>

  <a href="/" class="inline-block mt-7 text-accent text-sm">&larr; Back to map</a>
</div>

<script>
  const TW_COLORS = [
    "surface",
    "panel",
    "panel-2",
    "border",
    "muted",
    "accent",
    "accent-2",
    "danger",
  ];

  const colors = {
    surface: "#100B00",
    panel: "#3B341F",
    "panel-2": "#4F4730",
    border: "#2A2315",
    muted: "#A5CBC3",
    accent: "#85CB33",
    "accent-2": "#A5CBC3",
    danger: "#e05a4a",
  };

  const grid = document.getElementById("tw-colors");

  for (const name of TW_COLORS) {
    const hex = colors[name];
    const row = document.createElement("div");
    row.className = "flex items-center gap-3.5 bg-panel border border-border rounded-[10px] p-3";
    row.innerHTML =
      '<div class="w-12 h-12 rounded-lg border border-border shrink-0" style="background:' +
      hex +
      '"></div>' +
      '<div class="flex flex-col gap-0.5">' +
      '<span class="font-semibold text-sm">' +
      name +
      "</span>" +
      '<span class="text-muted text-xs font-mono">' +
      hex +
      "</span></div>";
    grid.appendChild(row);
  }
</script>
{% endblock %}
